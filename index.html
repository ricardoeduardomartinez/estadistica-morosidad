<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas de Morosidad</title>
    <style>
        /* ESTILOS BÁSICOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #131127 0%, #2a1954 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            color: #333;
        }
        
        /* TÍTULO PRINCIPAL */
        .titulo-principal {
            margin-bottom: 50px;
            padding-bottom: 25px;
            border-bottom: 4px solid #1a3a8f;
            position: relative;
        }
        
        .titulo-principal h1 {
            font-size: 52px;
            color: #1a3a8f;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .titulo-principal h2 {
            font-size: 40px;
            color: #2a5bd7;
            font-weight: 600;
            margin-top: 10px;
        }
        
        /* LOGOS */
        .logos-container {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        
        .logo-item {
            text-align: center;
            padding: 25px;
            border-radius: 15px;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow: 8px 8px 16px #d9d9d9, -8px -8px 16px #ffffff;
            transition: all 0.4s ease;
            min-width: 320px;
        }
        
        .logo-item:hover {
            transform: translateY(-10px);
            box-shadow: 12px 12px 24px #c9c9c9, -12px -12px 24px #ffffff;
        }
        
        .logo-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }
        
        .logo-img:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 6px 10px rgba(42, 91, 215, 0.3));
        }
        
        .logo-text {
            font-size: 28px;
            color: #1a3a8f;
            font-weight: bold;
            margin: 15px 0 5px 0;
        }
        
        .logo-descripcion {
            font-size: 18px;
            color: #666;
            line-height: 1.4;
            margin-top: 5px;
        }
        
        /* LEMA */
        .lema {
            margin: 40px 0;
            padding: 20px;
            background: linear-gradient(90deg, #1a3a8f, #2a5bd7);
            border-radius: 12px;
            color: white;
            box-shadow: 0 6px 20px rgba(26, 58, 143, 0.3);
        }
        
        .lema p {
            font-size: 28px;
            font-style: italic;
            font-weight: bold;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        /* INSTRUCCIONES */
        .instrucciones {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #e8f4ff, #d4e7ff);
            border-radius: 12px;
            border-left: 6px solid #2a5bd7;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 15px rgba(42, 91, 215, 0.15);
        }
        
        .instrucciones p {
            color: #1a3a8f;
            font-size: 20px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        /* PLACEHOLDER */
        .img-placeholder {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: #666;
            border: 3px dashed #999;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .img-placeholder:hover {
            background: linear-gradient(135deg, #e0e0e0, #d0d0d0);
            border-color: #2a5bd7;
        }
        
        .img-placeholder .icon {
            font-size: 60px;
            margin-bottom: 15px;
            color: #999;
        }
        
        /* RESPONSIVE */
        @media (max-width: 992px) {
            .container {
                padding: 30px 20px;
            }
            
            .titulo-principal h1 {
                font-size: 42px;
            }
            
            .titulo-principal h2 {
                font-size: 32px;
            }
            
            .logos-container {
                gap: 40px;
            }
            
            .logo-item {
                min-width: 280px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px 15px;
            }
            
            .titulo-principal h1 {
                font-size: 36px;
                letter-spacing: 2px;
            }
            
            .titulo-principal h2 {
                font-size: 28px;
            }
            
            .logos-container {
                gap: 30px;
                flex-direction: column;
                align-items: center;
            }
            
            .logo-item {
                width: 100%;
                max-width: 350px;
                min-width: unset;
            }
            
            .logo-img {
                width: 150px;
                height: 150px;
            }
            
            .lema p {
                font-size: 22px;
            }
            
            .instrucciones p {
                font-size: 18px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- TÍTULO PRINCIPAL -->
        <div class="titulo-principal">
            <h1>ESTADÍSTICAS</h1>
            <h2>MOROSIDAD</h2>
        </div>

        <!-- LOGOS UAI Y VANEDUC -->
        <div class="logos-container">
            <!-- LOGO UAI -->
            <div class="logo-item" id="logoUAI-item">
                <div id="logoUAI-container">
                    <!-- Placeholder que se muestra si la imagen no carga -->
                    <div class="img-placeholder" id="uai-placeholder" style="display: none;">
                        <div class="icon">UAI</div>
                        <span>Logo UAI</span>
                    </div>
                    <!-- Imagen real -->
                    <img src="img/logo_uai.png" alt="UAI" class="logo-img" id="logoUAI-img">
                </div>
                <div class="logo-text">UAI</div>
                <div class="logo-descripcion">Universidad Abierta<br>Interamericana</div>
            </div>
            
            <!-- LOGO VANEDUC -->
            <div class="logo-item">
                <a href="colegios.html" class="vaneduc-link" style="text-decoration: none; color: inherit;">
                    <div id="logoVaneduc-container">
                        <!-- Placeholder que se muestra si la imagen no carga -->
                        <div class="img-placeholder" id="vaneduc-placeholder" style="display: none;">
                            <div class="icon">VANEDUC</div>
                            <span>Logo VANEDUC</span>
                        </div>
                        <!-- Imagen real -->
                        <img src="img/logo_vaneduc.png" alt="VANEDUC" class="logo-img" id="logoVaneduc-img">
                    </div>
                    <div class="logo-text">VANEDUC</div>
                </a>
            </div>
        </div>
        
        <!-- LEMA -->
        <div class="lema">
            <p>EXCELLENTIA IN EDUCATIONE</p>
        </div>
        
        <!-- INSTRUCCIONES -->
        <div class="instrucciones">
            <p><i class="fas fa-mouse-pointer"></i> Haz clic en alguna imagen para ver las estadísticas</p>
        </div>
    </div>

    <script>
        // Función para verificar y manejar imágenes
        function configurarImagenes() {
            console.log("=== CONFIGURANDO IMÁGENES ===");
            
            // Lista de imágenes a verificar
            const imagenes = [
                {
                    id: 'logoUAI-img',
                    placeholder: 'uai-placeholder',
                    ruta: 'img/logo_uai.png',
                    nombre: 'Logo UAI'
                },
                {
                    id: 'logoVaneduc-img',
                    placeholder: 'vaneduc-placeholder',
                    ruta: 'img/logo_vaneduc.png',
                    nombre: 'Logo VANEDUC'
                }
            ];
            
            // Verificar cada imagen
            imagenes.forEach(imgConfig => {
                const imgElement = document.getElementById(imgConfig.id);
                const placeholder = document.getElementById(imgConfig.placeholder);
                
                if (imgElement) {
                    // Crear una imagen de prueba para verificar si existe
                    const testImg = new Image();
                    testImg.onload = function() {
                        console.log("✅ " + imgConfig.nombre + " - EXISTE");
                        // Si la imagen existe, mostrar la imagen real
                        imgElement.style.display = 'block';
                        if (placeholder) placeholder.style.display = 'none';
                    };
                    testImg.onerror = function() {
                        console.log("❌ " + imgConfig.nombre + " - NO ENCONTRADA");
                        console.log("   Ruta: " + imgConfig.ruta);
                        // Si no existe, mostrar placeholder
                        imgElement.style.display = 'none';
                        if (placeholder) placeholder.style.display = 'flex';
                        
                        // Mostrar ayuda específica
                        mostrarAyudaImagen(imgConfig.ruta);
                    };
                    testImg.src = imgConfig.ruta;
                    
                    // Manejar error en la imagen real
                    imgElement.onerror = function() {
                        this.style.display = 'none';
                        if (placeholder) placeholder.style.display = 'flex';
                    };
                }
            });
        }
        
        // Mostrar ayuda para imágenes faltantes
        function mostrarAyudaImagen(ruta) {
            const nombreArchivo = ruta.split('/').pop();
            console.log("💡 Para solucionar:");
            console.log("   1. Asegúrate de tener la imagen: " + nombreArchivo);
            console.log("   2. En la carpeta 'img/' junto a index.html");
            console.log("   3. Nombre exacto: " + nombreArchivo);
        }
        
        // Configurar interactividad
        function configurarInteractividad() {
            // Hacer que el logo UAI sea clickeable (redirige a colegios.html)
            const logoUAI = document.getElementById('logoUAI-img');
            const placeholderUAI = document.getElementById('uai-placeholder');
            const itemUAI = document.getElementById('logoUAI-item');
            
            if (itemUAI) {
                itemUAI.style.cursor = 'pointer';
                itemUAI.addEventListener('click', function() {
                    window.location.href = 'colegios.html';
                });
            }
            
            if (logoUAI) {
                logoUAI.addEventListener('click', function(e) {
                    e.stopPropagation(); // Evitar doble ejecución
                    window.location.href = 'colegios.html';
                });
            }
            
            if (placeholderUAI) {
                placeholderUAI.addEventListener('click', function(e) {
                    e.stopPropagation();
                    window.location.href = 'colegios.html';
                });
            }
            
            // Verificar que colegios.html exista
            const linkColegios = document.querySelector('a[href="colegios.html"]');
            if (linkColegios) {
                // Prueba silenciosa para verificar que existe
                fetch('colegios.html')
                    .then(response => {
                        if (!response.ok) {
                            console.warn("⚠️ colegios.html no encontrado o no accesible");
                        }
                    })
                    .catch(error => {
                        console.warn("⚠️ No se pudo verificar colegios.html:", error.message);
                    });
            }
        }
        
        // Inicializar cuando la página cargue
        document.addEventListener('DOMContentLoaded', function() {
            console.log("=== PÁGINA DE ESTADÍSTICAS DE MOROSIDAD ===");
            console.log("Inicializando...");
            
            configurarImagenes();
            configurarInteractividad();
            
            // Información útil para depuración
            console.log("ℹ️ Para compartir esta página:");
            console.log("   1. Sube TODA la carpeta a OneDrive");
            console.log("   2. Comparte index.html como 'Cualquier persona'");
            console.log("   3. Usa: https://htmlpreview.github.io/?[TU_ENLACE]");
            console.log("   4. Asegúrate que colegios.html esté en la misma carpeta");
            
            // Mostrar año actual si hay un elemento para ello
            const yearElement = document.getElementById('currentYear');
            if (yearElement) {
                yearElement.textContent = new Date().getFullYear();
            }
        });
    </script>
</body>
</html>
